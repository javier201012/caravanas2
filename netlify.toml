[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/api/create-checkout-session"
  to = "/.netlify/functions/create-checkout-session"
  status = 200

[[redirects]]
  from = "/api/availability"
  to = "/.netlify/functions/get-availability"
  status = 200

[[redirects]]
  from = "/api/admin/availability"
  to = "/.netlify/functions/update-availability"
  status = 200

[[redirects]]
  from = "/api/admin/verify"
  to = "/.netlify/functions/verify-admin"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200